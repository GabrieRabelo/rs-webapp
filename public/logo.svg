<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- steam: two wisps curling inward -->
  <rect x="8"  y="6" width="2" height="2" fill="#9ca3af"/>
  <rect x="18" y="6" width="2" height="2" fill="#9ca3af"/>
  <rect x="10" y="8" width="2" height="2" fill="#9ca3af"/>
  <rect x="16" y="8" width="2" height="2" fill="#9ca3af"/>

  <!-- rim: full width across top of cone -->
  <rect x="4"  y="12" width="22" height="2" fill="#92400e"/>

  <!-- coffee fill inside cone (amber-600) -->
  <rect x="8"  y="14" width="14" height="2" fill="#d97706"/>
  <rect x="10" y="16" width="10" height="2" fill="#d97706"/>
  <rect x="12" y="18" width="6"  height="2" fill="#d97706"/>
  <rect x="14" y="20" width="2"  height="2" fill="#d97706"/>

  <!-- cone outline (amber-800): sides narrow to a tip -->
  <rect x="6"  y="14" width="2" height="2" fill="#92400e"/>
  <rect x="22" y="14" width="2" height="2" fill="#92400e"/>
  <rect x="8"  y="16" width="2" height="2" fill="#92400e"/>
  <rect x="20" y="16" width="2" height="2" fill="#92400e"/>
  <rect x="10" y="18" width="2" height="2" fill="#92400e"/>
  <rect x="18" y="18" width="2" height="2" fill="#92400e"/>
  <rect x="12" y="20" width="2" height="2" fill="#92400e"/>
  <rect x="16" y="20" width="2" height="2" fill="#92400e"/>
  <!-- tip -->
  <rect x="14" y="22" width="2" height="2" fill="#92400e"/>
</svg>
